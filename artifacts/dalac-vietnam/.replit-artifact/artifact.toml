kind = "web"
previewPath = "/"
title = "Da Lac Vietnam"
version = "1.0.0"
id = "artifacts/dalac-vietnam"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24603

[services.development]
run = "pnpm --filter @workspace/dalac-vietnam run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dalac-vietnam", "run", "build" ]
publicDir = "artifacts/dalac-vietnam/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24603"
BASE_PATH = "/"
